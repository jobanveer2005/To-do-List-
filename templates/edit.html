<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            ✏️ Edit Task
        </h2>

        <form action="/update/{{ task[0] }}" method="POST">

            <!-- Task Title -->

            <div class="mb-3">

                <label class="form-label">
                    Task Title
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="title"
                    value="{{ task[1] }}"
                    required>

            </div>

            <!-- Description -->

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    class="form-control"
                    rows="4"
                    name="description">{{ task[2] }}</textarea>

            </div>

            <!-- Priority -->

            <div class="mb-3">

                <label class="form-label">
                    Priority
                </label>

                <select
                    class="form-select"
                    name="priority">

                    <option value="High"
                    {% if task[3]=="High" %}
                    selected
                    {% endif %}
                    >
                        High
                    </option>

                    <option value="Medium"
                    {% if task[3]=="Medium" %}
                    selected
                    {% endif %}
                    >
                        Medium
                    </option>

                    <option value="Low"
                    {% if task[3]=="Low" %}
                    selected
                    {% endif %}
                    >
                        Low
                    </option>

                </select>

            </div>

            <!-- Due Date -->

            <div class="mb-3">

                <label class="form-label">
                    Due Date
                </label>

                <input
                    type="date"
                    class="form-control"
                    name="due_date"
                    value="{{ task[4] }}">

            </div>

            <!-- Buttons -->

            <button class="btn btn-primary">

                Update Task

            </button>

            <a href="/" class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

</body>

</html>
